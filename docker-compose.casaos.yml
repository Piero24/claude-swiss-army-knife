# CasaOS docker-compose — MCP permission management stack
#
# Designed for CasaOS import. Uses bridge networking, explicit port mappings,
# and LONG volume/port syntax required by the CasaOS UI parser.
#
# Usage: Import this file into CasaOS or run:
#   docker compose -f docker-compose.casaos.yml up -d --build

services:
  ubuntu-mcp:
    build:
      context: ./mcp-servers/ubuntu-server
      args:
        PERMISSION_ENGINE_PATH: shared/mcp-permission-engine
    image: ubuntu-mcp:latest
    container_name: ubuntu-mcp
    cpu_shares: 90
    command: []
    deploy:
      resources:
        limits:
          memory: 512M
    stdin_open: true
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home
        target: /mnt/host/home
      - type: bind
        source: /var/www
        target: /mnt/host/var/www
      - type: bind
        source: /var/log
        target: /mnt/host/var/log
        read_only: true
      - type: bind
        source: /etc/nginx
        target: /mnt/host/etc/nginx
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - type: bind
        source: ./configs/ubuntu-server.yaml
        target: /app/config.yaml
        read_only: true
      - type: bind
        source: ${MCP_LOG_DIR:-/DATA/AppData/mcp-logs}/ubuntu
        target: /var/log/mcp
    x-casaos:
      volumes:
        - container: /mnt/host/home
          description:
            en_us: Host home directory (read-write)
        - container: /mnt/host/var/www
          description:
            en_us: Host web root (read-write)
        - container: /mnt/host/var/log
          description:
            en_us: Host system logs (read-only)
        - container: /mnt/host/etc/nginx
          description:
            en_us: Host nginx config (read-write)
        - container: /var/run/docker.sock
          description:
            en_us: Docker socket for container management
        - container: /app/config.yaml
          description:
            en_us: Permission config file (read-only)
        - container: /var/log/mcp
          description:
            en_us: Audit log directory

  obsidian-mcp:
    build:
      context: ./mcp-servers/obsidian
      args:
        PERMISSION_ENGINE_PATH: shared/mcp-permission-engine
    image: obsidian-mcp:latest
    container_name: obsidian-mcp
    cpu_shares: 90
    command: []
    deploy:
      resources:
        limits:
          memory: 256M
    stdin_open: true
    restart: unless-stopped
    volumes:
      - type: bind
        source: ${OBSIDIAN_VAULT_PATH:-/DATA/obsidian-vaults}
        target: /data/vaults
      - type: bind
        source: ./configs/obsidian.yaml
        target: /app/config.yaml
        read_only: true
      - type: bind
        source: ${MCP_LOG_DIR:-/DATA/AppData/mcp-logs}/obsidian
        target: /var/log/mcp
    x-casaos:
      volumes:
        - container: /data/vaults
          description:
            en_us: Obsidian vault directory
        - container: /app/config.yaml
          description:
            en_us: Permission config file (read-only)
        - container: /var/log/mcp
          description:
            en_us: Audit log directory

  synology-mcp:
    build:
      context: ./mcp-servers/synology-nas
      args:
        PERMISSION_ENGINE_PATH: shared/mcp-permission-engine
    image: synology-mcp:latest
    container_name: synology-mcp
    cpu_shares: 90
    command: []
    deploy:
      resources:
        limits:
          memory: 256M
    stdin_open: true
    restart: unless-stopped
    volumes:
      - type: bind
        source: ./configs/synology-nas.yaml
        target: /app/config.yaml
        read_only: true
      - type: bind
        source: ${MCP_LOG_DIR:-/DATA/AppData/mcp-logs}/synology
        target: /var/log/mcp
    environment:
      - SYNOLOGY_NAS_HOST=${SYNOLOGY_NAS_HOST}
      - SYNOLOGY_NAS_PORT=${SYNOLOGY_NAS_PORT}
      - SYNOLOGY_NAS_USER=${SYNOLOGY_NAS_USER}
      - SYNOLOGY_NAS_PASSWORD=${SYNOLOGY_NAS_PASSWORD}
      - SYNOLOGY_NAS_OTP_SECRET=${SYNOLOGY_NAS_OTP_SECRET:-}
    x-casaos:
      envs:
        - container: SYNOLOGY_NAS_HOST
          description:
            en_us: NAS hostname or IP address
        - container: SYNOLOGY_NAS_PORT
          description:
            en_us: NAS DSM port (default 5001)
        - container: SYNOLOGY_NAS_USER
          description:
            en_us: NAS login username
        - container: SYNOLOGY_NAS_PASSWORD
          description:
            en_us: NAS login password
      volumes:
        - container: /app/config.yaml
          description:
            en_us: Permission config file (read-only)
        - container: /var/log/mcp
          description:
            en_us: Audit log directory

  github-mcp:
    build:
      context: ./mcp-servers/github
      args:
        PERMISSION_ENGINE_PATH: shared/mcp-permission-engine
        PROXY_PATH: shared/mcp-proxy
    image: github-mcp:latest
    container_name: github-mcp
    cpu_shares: 90
    command: []
    deploy:
      resources:
        limits:
          memory: 512M
    stdin_open: true
    restart: unless-stopped
    volumes:
      - type: bind
        source: ./configs/github-mcp.yaml
        target: /app/config.yaml
        read_only: true
      - type: bind
        source: ./configs/users.yaml
        target: /app/users.yaml
        read_only: true
      - type: bind
        source: ${MCP_LOG_DIR:-/DATA/AppData/mcp-logs}/github
        target: /var/log/mcp
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_TOKEN:-}
    x-casaos:
      envs:
        - container: GITHUB_PERSONAL_ACCESS_TOKEN
          description:
            en_us: GitHub personal access token
      volumes:
        - container: /app/config.yaml
          description:
            en_us: Permission config file (read-only)
        - container: /app/users.yaml
          description:
            en_us: User authentication config (read-only)
        - container: /var/log/mcp
          description:
            en_us: Audit log directory

  mcp-webui:
    build:
      context: ./mcp-webui
    image: mcp-webui:latest
    container_name: mcp-webui
    cpu_shares: 90
    command: []
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    volumes:
      - type: bind
        source: ./configs
        target: /app/configs
      - type: bind
        source: ${MCP_LOG_DIR:-/DATA/AppData/mcp-logs}
        target: /var/log/mcp
        read_only: true
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
    environment:
      - WEBUI_API_KEY=${WEBUI_API_KEY}
      - WEBUI_AUTH_SECRET=${WEBUI_AUTH_SECRET}
      - CONFIGS_PATH=/app/configs
      - LOGS_PATH=/var/log/mcp
    ports:
      - mode: ingress
        target: 8280
        published: "${WEBUI_PORT:-8280}"
        protocol: tcp
    x-casaos:
      envs:
        - container: WEBUI_API_KEY
          description:
            en_us: API key for internal service communication
        - container: WEBUI_AUTH_SECRET
          description:
            en_us: Session encryption secret
      ports:
        - container: "8280"
          description:
            en_us: Web UI port
      volumes:
        - container: /app/configs
          description:
            en_us: Server config files (read-write)
        - container: /var/log/mcp
          description:
            en_us: Audit logs (read-only)

networks:
  default:
    name: mcp-stack_default

x-casaos:
  architectures:
    - amd64
    - arm64
  author: Piero24
  category: Developer Tools
  description:
    en_us: MCP Permission Manager — secure gating, audit logging, and access control for Claude Code MCP servers. Includes Ubuntu, Obsidian, Synology NAS, and GitHub proxy servers with a web dashboard.
  developer: Piero24
  icon: https://raw.githubusercontent.com/Piero24/claude-swiss-army-knife/main/mcp-webui/public/favicon.ico
  main: mcp-webui
  port_map: "${WEBUI_PORT:-8280}"
  scheme: http
  tagline:
    en_us: Secure MCP access control
  title:
    en_us: MCP Permission Manager
