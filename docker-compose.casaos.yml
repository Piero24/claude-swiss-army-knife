# docker-compose.casaos.yml — MCP stack adapted for CasaOS
#
# Differences from the standard docker-compose.yml:
#   - Removes host networking (not supported by CasaOS)
#   - Removes pid: host (not supported by CasaOS)
#   - Uses bridge networking with explicit port mappings
#   - Volume paths follow CasaOS conventions (/DATA/AppData/...)
#   - ubuntu-mcp uses bind mounts instead of host-mode for filesystem access
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. Run: docker compose -f docker-compose.casaos.yml up -d --build
#
# Notes:
#   - ubuntu-mcp without host networking cannot manage host systemd services
#     directly. File operations, docker commands (via docker.sock), and
#     container management still work.
#   - For full systemd management, consider running ubuntu-mcp on the host
#     or using SSH tunneling instead.

services:
  # ============================================================
  # Obsidian Stack
  # ============================================================

  obsidian-livesync:
    image: big-bear-obsidian-livesync:latest
    container_name: obsidian-livesync
    volumes:
      - ${OBSIDIAN_LIVESYNC_DATA:-/DATA/AppData/big-bear-obsidian-livesync/data}:/data
    restart: unless-stopped

  obsidian:
    image: your-obsidian-image:latest
    container_name: obsidian
    volumes:
      - ${OBSIDIAN_VAULT_PATH:-/DATA/obsidian-vaults}:/vault
    restart: unless-stopped

  # ============================================================
  # MCP Servers (Python 3.12)
  # ============================================================

  ubuntu-mcp:
    build:
      context: ./mcp-servers/ubuntu-server
      args:
        PERMISSION_ENGINE_PATH: shared/mcp-permission-engine
    image: ubuntu-mcp:${UBUNTU_MCP_IMAGE_TAG:-latest}
    container_name: ${UBUNTU_MCP_CONTAINER:-ubuntu-mcp}
    volumes:
      # CasaOS data typically lives under /DATA. Adjust source paths
      # to match your host filesystem layout.
      - /home:/mnt/host/home:rw
      - /var/www:/mnt/host/var/www:rw
      - /var/log:/mnt/host/var/log:ro
      - /etc/nginx:/mnt/host/etc/nginx:rw
      # Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock
      # Config and logs
      - ./configs/ubuntu-server.yaml:/app/config.yaml:ro
      - ${MCP_LOG_DIR:-/DATA/AppData/mcp-logs}/ubuntu:/var/log/mcp
    stdin_open: true
    restart: unless-stopped
    # CasaOS note: host networking and pid: host are not available.
    # ubuntu-mcp can still manage files, run docker commands, and
    # control containers via the docker socket mount above.
    # Systemd management of the host is not available in this mode.

  obsidian-mcp:
    build:
      context: ./mcp-servers/obsidian
      args:
        PERMISSION_ENGINE_PATH: shared/mcp-permission-engine
    image: obsidian-mcp:${OBSIDIAN_MCP_IMAGE_TAG:-latest}
    container_name: ${OBSIDIAN_MCP_CONTAINER:-obsidian-mcp}
    volumes:
      - ${OBSIDIAN_VAULT_PATH:-/DATA/obsidian-vaults}:/data/vaults:rw
      - ./configs/obsidian.yaml:/app/config.yaml:ro
      - ${MCP_LOG_DIR:-/DATA/AppData/mcp-logs}/obsidian:/var/log/mcp
    stdin_open: true
    restart: unless-stopped

  synology-mcp:
    build:
      context: ./mcp-servers/synology-nas
      args:
        PERMISSION_ENGINE_PATH: shared/mcp-permission-engine
    image: synology-mcp:${SYNOLOGY_MCP_IMAGE_TAG:-latest}
    container_name: ${SYNOLOGY_MCP_CONTAINER:-synology-mcp}
    volumes:
      - ./configs/synology-nas.yaml:/app/config.yaml:ro
      - ${MCP_LOG_DIR:-/DATA/AppData/mcp-logs}/synology:/var/log/mcp
    environment:
      - SYNOLOGY_NAS_HOST=${SYNOLOGY_NAS_HOST}
      - SYNOLOGY_NAS_PORT=${SYNOLOGY_NAS_PORT}
      - SYNOLOGY_NAS_USER=${SYNOLOGY_NAS_USER}
      - SYNOLOGY_NAS_PASSWORD=${SYNOLOGY_NAS_PASSWORD}
      - SYNOLOGY_NAS_OTP_SECRET=${SYNOLOGY_NAS_OTP_SECRET:-}
    stdin_open: true
    restart: unless-stopped

  # ============================================================
  # Web UI — Permission Manager (Next.js 15 / TypeScript)
  # ============================================================

  mcp-webui:
    build:
      context: ./mcp-webui
    image: mcp-webui:${WEBUI_IMAGE_TAG:-latest}
    container_name: mcp-webui
    volumes:
      - ./configs:/app/configs:rw
      - ${MCP_LOG_DIR:-/DATA/AppData/mcp-logs}:/var/log/mcp:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - WEBUI_API_KEY=${WEBUI_API_KEY}
      - WEBUI_AUTH_SECRET=${WEBUI_AUTH_SECRET}
      - CONFIGS_PATH=/app/configs
      - LOGS_PATH=/var/log/mcp
    ports:
      - "${WEBUI_PORT:-8280}:8280"
    restart: unless-stopped

  # ============================================================
  # Documentation Site (Docusaurus 3)
  # ============================================================

  docs-site:
    build:
      context: ./docs-site
    image: docs-site:${DOCS_IMAGE_TAG:-latest}
    container_name: docs-site
    ports:
      - "${DOCS_PORT:-3000}:3000"
    restart: unless-stopped
