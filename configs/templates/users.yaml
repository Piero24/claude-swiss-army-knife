# User authentication and access control for MCP servers.
#
# Copy this to ../users.yaml and edit with real values.
#
# Key format: "sha256$<salt>$<hash>" (salted) or legacy "sha256$<hash>" (unsalted).
# Generate salted keys via the Web UI (Agents → Add User → Generate).
# Legacy format without salt still works for backward compatibility.
#
# mode: "open" (default) | "allowlist" | "blocklist"
#   - open:       everyone can use tools (users can be disabled individually)
#   - allowlist:  only listed + enabled users can use tools
#   - blocklist:  everyone except disabled users can use tools
#
# tools: ["*"] = all tools, or list specific tool names per server

mode: open

users:
  - id: "alice"
    key: "sha256$a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6$e35c28e2b4a1d9f7c8b3a6e0d2f5a9c1b7e4d8f0a3c6b9e2d5f8a1c4b7e0d3"  # example salted — replace
    name: "Alice"
    enabled: true
    tools: ["*"]

  - id: "bob"
    key: "sha256$f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5$f4d2e1a3c5b7d9e0f2a4c6b8d0e3f5a7c9b1d4e6f8a0c3b5d7e9f1a4c6b8d0"  # example salted — replace
    name: "Bob"
    enabled: true
    tools: ["ubuntu_read_file", "ubuntu_list_dir"]
