name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python: format check + lint + permission engine tests ──
  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mcp-servers

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyink (Google Python formatter)
        run: pip install pyink

      - name: Check formatting with pyink
        run: pyink --check --diff .

      - name: Install pylint
        run: pip install pylint

      - name: Lint with pylint
        run: pylint shared/ ubuntu-server/src/ obsidian/src/ synology-nas/src/ --exit-zero
        continue-on-error: true

      - name: Install permission engine with dev deps
        run: |
          pip install -e ./shared/mcp-permission-engine[dev]

      - name: Run permission engine tests with coverage
        working-directory: ./mcp-servers/shared/mcp-permission-engine
        run: |
          pytest --cov=permission_engine --cov-report=xml --cov-report=term-missing -v

  # ── MCP server smoke tests (matrix across 3 servers) ──
  mcp-smoke-tests:
    runs-on: ubuntu-latest
    needs: [python-tests]
    strategy:
      matrix:
        server:
          - name: ubuntu-server
            path: ./mcp-servers/ubuntu-server
          - name: obsidian
            path: ./mcp-servers/obsidian
          - name: synology-nas
            path: ./mcp-servers/synology-nas

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install permission engine (editable)
        run: pip install -e ./mcp-servers/shared/mcp-permission-engine

      - name: Install ${{ matrix.server.name }} with dev deps
        run: |
          cd ${{ matrix.server.path }}
          pip install -e ".[dev]"

      - name: Run smoke tests for ${{ matrix.server.name }}
        working-directory: ${{ matrix.server.path }}
        run: pytest tests/ -v --tb=short

  # ── TypeScript / Next.js lint + typecheck + test + build ──
  web-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mcp-webui

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./mcp-webui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint with ESLint
        run: npm run lint

      - name: Run tests
        run: npx vitest run --reporter=verbose

      - name: Build Next.js
        run: npm run build

  # ── Docusaurus docs build check ──
  docs-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./docs-site

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./docs-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus site
        run: npm run build
        env:
          NODE_ENV: production

  # ── Docker image build verification ──
  docker-build:
    runs-on: ubuntu-latest
    needs: [mcp-smoke-tests, web-ui, docs-build]

    strategy:
      matrix:
        service:
          - name: ubuntu-mcp
            context: ./mcp-servers/ubuntu-server
            dockerfile: ./mcp-servers/ubuntu-server/Dockerfile
          - name: obsidian-mcp
            context: ./mcp-servers/obsidian
            dockerfile: ./mcp-servers/obsidian/Dockerfile
          - name: synology-mcp
            context: ./mcp-servers/synology-nas
            dockerfile: ./mcp-servers/synology-nas/Dockerfile
          - name: mcp-webui
            context: ./mcp-webui
            dockerfile: ./mcp-webui/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy shared permission engine (MCP servers only)
        if: matrix.service.name != 'mcp-webui'
        run: cp -r ./mcp-servers/shared/mcp-permission-engine ${{ matrix.service.context }}/shared/mcp-permission-engine

      - name: Build ${{ matrix.service.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          tags: ${{ matrix.service.name }}:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PERMISSION_ENGINE_PATH=shared/mcp-permission-engine
